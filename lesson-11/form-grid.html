<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lesson 11 | Bootstrap Form Controls</title>
	<!-- STEP 1: Attach the Boostrap CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<!-- STEP 3: Style the BODY background -->
<body class="bg-light">
<!-- STEP 4: Add a page layout container with top and bottom margins -->
<div class="container my-5">
	<!-- STEP 5: Let's use the Bootstrap Grid Layout system - add a row -->
    <div class="row justify-content-center">
		<!-- STEP 6: Now add a column, full width for small screens, a bit narrowor for medium and bigger - plus some other visual refinements -->
        <div class="col-sm-12 col-md-8 bg-white p-4 shadow-sm rounded">
			<!-- STEP 7: Add an H2, with a bigger bottom margin class -->
            <h2 class="mb-4">Standard Form Controls</h2>
            <form>
                <!-- STEP 8: Construct a text INPUT for full name with appropriate classes -->
                <div class="mb-3">
                    <label for="exampleName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="exampleName" placeholder="Jane Doe">
                </div>
				<!-- STEP 9: Build out a new row containing 2 columns -->
                <div class="row mb-3">
					<!-- STEP 10: Build an Input for email with LABEL -->
                    <div class="col-sm-12 col-md-6">
                        <label for="exampleEmail" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="exampleEmail">
                        <div class="form-text">We'll never share your email.</div>
                    </div>
					<!-- STEP 11: Build an INPUT for password with LABEL -->
                    <div class="col-sm-12 col-md-6">
                        <label for="examplePassword" class="form-label">Password</label>
                        <input type="password" class="form-control" id="examplePassword">
                    </div>
                </div>
				<!-- STEP 12: Create a SELECT element with LABEL -->
                <div class="mb-3">
                    <label for="exampleSelect" class="form-label">Favorite Coding Language</label>
                    <select class="form-select" id="exampleSelect">
                        <option selected disabled>Open this select menu</option>
                        <option value="1">HTML/CSS</option>
                        <option value="2">JavaScript</option>
                        <option value="3">Python</option>
                    </select>
                </div>
				<!-- STEP 13: Create a TEXTAREA element with LABEL -->
                <div class="mb-3">
                    <label for="exampleBio" class="form-label">Short Bio</label>
                    <textarea class="form-control" id="exampleBio" rows="3"></textarea>
                </div>
				<!-- STEP 14: Build out an INPUT with add-ons for donation amount -->
				<label for="donation" class="form-label">Donation amount</label>
				<div class="input-group mb-3">
					<span class="input-group-text">$</span>
					<input type="number" class="form-control" id="donation" />
					<span class="input-group-text">.00</span>
				</div>
				<!-- STEP 15: Insert a DIV for a collection of input elements, with a LABEL -->
                <div class="mb-3">
                    <label class="form-label d-block">Preferences</label>
					<!-- STEP 16: Build a checkbox -->
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="check1" value="option1">
                        <label class="form-check-label" for="check1">Subscribe</label>
                    </div>
					<!-- STEP 17a: Build a radio button -->
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="radioGroup" id="radio1" value="option1">
                        <label class="form-check-label" for="radio1">Light Mode</label>
                    </div>
					<!-- STEP 17b: Add another radio button -->
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="radioGroup" id="radio2" value="option2">
                        <label class="form-check-label" for="radio2">Dark Mode</label>
                    </div>
                </div>
				<!-- STEP 18: Build a toggle switch button -->
                <div class="mb-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckDefault">
                        <label class="form-check-label" for="flexSwitchCheckDefault">Enable Notifications (Switch)</label>
                    </div>
                </div>
				<!-- STEP 19: Assemble a range slider -->
                <div class="mb-3">
                    <label for="customRange" class="form-label">Skill Level</label>
                    <input type="range" class="form-control-range w-100" id="customRange" min="0" max="5">
                </div>
				<!-- STEP 20: Craft a file upload widget -->
                <div class="mb-4">
                    <label for="formFile" class="form-label">Upload Profile Picture</label>
                    <input class="form-control" type="file" id="formFile">
                </div>
				<!-- STEP 21: Complete the form with a submit BUTTON element -->
                <button type="submit" class="btn btn-primary px-4">Submit Form</button>
            </form>
        </div>
    </div>
</div>
<!-- STEP 3: Attach the Bootstrap JS libraries via CDN as well -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
